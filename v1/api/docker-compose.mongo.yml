services:
  mongo:
    image: mongo:8.2.3
    restart: unless-stopped
    ports:
      - $MONGO_PORT:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: $MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD: $MONGO_PASSWORD
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      start_period: 5s
      start_interval: 1s
      interval: 10s
      timeout: 10s
      retries: 3

  
  api:
    build: .
    ports:
      - $API_PORT:8000
    env_file: .env
    volumes:
      - ../../gridmaker/output/city_grid.geojson:/app/grid/city_grid.geojson:ro
      - ../blockchain/contract_abi.json:/app/contract_abi.json:ro
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
