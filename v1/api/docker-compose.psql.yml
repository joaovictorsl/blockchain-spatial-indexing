services:
  postgres:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    ports:
      - $POSTGRES_PORT:5432
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  api:
    build: .
    ports:
      - $API_PORT:8000
    env_file: .env
    volumes:
      - ../../gridmaker/output/city_grid.geojson:/app/grid/city_grid.geojson:ro
      - ../blockchain/contract_abi.json:/app/contract_abi.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
